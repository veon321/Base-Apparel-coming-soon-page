<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <title>Base Apparel coming soon page</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <div class="content-side">
        <header class="logo-container">
          <img src="images/logo.svg" alt="Base Apparel Logo" />
        </header>

        <section class="main-text">
          <h1 class="head"><span class="we">We're</span><br />coming soon</h1>
          <p class="description">
            Hello fellow shoppers! We're currently building our new fashion
            store. Add your email below to stay up-to-date with announcements
            and our launch deals.
          </p>

          <form id="emailForm" novalidate>
            <div class="input-container">
              <input
                type="email"
                id="email"
                name="email"
                placeholder="Email Address"
              />
              <img
                src="images/icon-error.svg"
                alt=""
                class="error-icon"
                id="errorIcon"
              />
              <button type="submit" class="arrow-btn" aria-label="Submit email">
                <img src="images/icon-arrow.svg" alt="" />
              </button>
            </div>
            <p class="error-text" id="errorText"></p>
          </form>
        </section>
      </div>

      <div class="img-side"></div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
